<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Social Media Pipeline</title>
    <link rel="icon" type="image/svg+xml" href="/image/favicon.svg" />
    <script>if(localStorage.getItem('theme')==='dark')document.documentElement.setAttribute('data-theme','dark')</script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --c-surface: #fff;
        --c-app:     #f0f2f5;
        --c-hover:   #f1f3f4;
        --c-border:  #dadce0;
        --c-text:    #202124;
        --c-muted:   #5f6368;
        --c-shadow:  rgba(0,0,0,0.10);
        --c-nav:        #16202d;
        --c-nav-text:   #e2e8f0;
        --c-nav-muted:  #8896a7;
        --c-nav-hover:  rgba(255,255,255,0.07);
        --c-nav-border: rgba(255,255,255,0.07);
      }
      [data-theme="dark"] {
        --c-surface: #1e1e1e;
        --c-app:     #121212;
        --c-hover:   #2d2d2d;
        --c-border:  #3c3c3c;
        --c-text:    #e8eaed;
        --c-muted:   #9aa0a6;
        --c-shadow:  rgba(0,0,0,0.4);
        --c-nav:        #0d1117;
        --c-nav-text:   #c9d1d9;
        --c-nav-muted:  #6e7681;
        --c-nav-hover:  rgba(255,255,255,0.06);
        --c-nav-border: rgba(255,255,255,0.08);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.2s, border-color 0.2s, color 0.2s; }
      body { font-family: 'Roboto', sans-serif; background: var(--c-app); color: var(--c-text); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
