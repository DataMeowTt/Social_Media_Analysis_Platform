name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/ --exclude "src/ml/*.ipynb,tests/test_ai"

  test-pure:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pure-Python tests
        env:
          ENV: test
          PYTHONPATH: ${{ github.workspace }}
        run: |
          pytest tests/test_ingestion.py \
                 tests/test_utils.py \
                 -v --tb=short

  test-spark:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pyspark==3.5.0

      - name: Run Spark tests
        env:
          ENV: test
          PYTHONPATH: ${{ github.workspace }}
          PYSPARK_PYTHON: python3
        run: |
          pytest tests/test_processing.py \
                 tests/test_analytics.py \
                 tests/test_fb_processing.py \
                 tests/test_fb_analytics.py \
                 tests/test_yt_processing.py \
                 -v --tb=short